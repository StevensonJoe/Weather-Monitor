<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src https://api.open-meteo.com; img-src 'self' data:;">
    <title>UK Port & Terminal Weather Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" integrity="sha384-3N9GHhCtN3CQef6tNfqgZlv7sQLYIkcChN+uaTZ7xVdzKYp/SjBNPxa92+hM7EAY" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>UK Port & Terminal Weather Monitor</h1>
            <p class="subtitle">Real-time wind, gust &amp; visibility monitoring</p>
        </div>
        <div class="header-controls">
            <span class="last-updated" id="lastUpdated">Loading...</span>
        </div>
    </header>

    <div id="alertBanner" class="alert-banner hidden"></div>

    <main>
        <section class="section">
            <h2 class="section-title">Container Ports</h2>
            <div class="card-grid" id="portsGrid"></div>
        </section>

        <section class="section">
            <h2 class="section-title">Inland Rail Terminals</h2>
            <div class="card-grid" id="terminalsGrid"></div>
        </section>
    </main>

    <div id="alertSettings" class="alert-settings">
        <h3>Wind Speed Alerts (mph)</h3>
        <div class="threshold-indicators">
            <span class="threshold-chip amber">&#x26a0; 30 mph - Caution</span>
            <span class="threshold-chip orange">&#x26a0; 35 mph - Warning</span>
            <span class="threshold-chip red">&#x26a0; 40 mph - Severe</span>
        </div>
    </div>

    <footer>
        <p>Data provided by <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo API</a> &bull; Auto-updates every 5 minutes</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
